<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Min Min & Tinzar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="envelope-wrapper" id="envelopeWrapper">
            <div class="envelope">
                <div class="flap"></div> <div class="front"></div> <div class="letter" id="letter">
                    <img src="https://i.postimg.cc/XNzq3WZW/file-000000002f9871f4beb2f36b81dfad9f.png" class="banner">
                    
                    <div class="letter-text">
                        <h2 class="names">Min Min & Tinzar</h2>
                        <p class="date">📅 ၂၉ ဧပြီ ၂၀၂၆ (ဗုဒ္ဓဟူးနေ့)</p>
                        <p class="time">🕙 နံနက် ၁၀:၀၀ နာရီ</p>
                        <p class="location">📍 Abu Dhabi Civil Family Court</p>
                        
                        <a href="https://maps.app.goo.gl/8Pj9mbeQQf2bVAgf8" target="_blank" class="map-btn">
                            Google Maps တွင်ကြည့်ရန်
                        </a>
                    </div>
                </div>
            </div>
            
            <div class="wax-seal" id="seal" onclick="openEnvelope()">
                <img src="https://i.postimg.cc/85zXq4vD/wax-seal-red.png" alt="Seal">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
